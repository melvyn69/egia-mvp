name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase migration history
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/validate-supabase-migration-history.mjs --base "${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            node scripts/validate-supabase-migration-history.mjs --base "${{ github.event.before }}"
          else
            node scripts/validate-supabase-migration-history.mjs
          fi

      - name: Test migration-history guardrails
        run: npm run test:migration-history:adversarial

      - name: Validate canonical bootstrap plan
        run: npm run test:canonical-bootstrap

      - name: Test canonical bootstrap guardrails
        run: npm run test:canonical-bootstrap:guards

      - name: Test production security guardrails
        run: npm run test:production-security

      - name: Test GOAL-006 SQL guardrails
        run: npm run test:goal-006

      - name: Typecheck Edge Functions
        run: npm run test:edge-types

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
