name: Migration History Guard

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  migration-history-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          path: trusted

      - name: Checkout candidate without credentials
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Import trusted base commit into candidate history
        run: |
          git -C candidate fetch --no-tags ../trusted \
            "${{ github.event.pull_request.base.sha }}"

      - name: Run validator from trusted base
        run: |
          node trusted/scripts/validate-supabase-migration-history.mjs \
            --root candidate \
            --base "${{ github.event.pull_request.base.sha }}"
